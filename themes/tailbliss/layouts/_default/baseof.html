<!DOCTYPE html>
<html lang="{{ .Language.Lang }}">

<head>
    {{ partial "head.html" . }}
</head>

<body class="{{ if .IsHome }}bg-black{{ else }}bg-gray-50 dark:bg-gray-950{{ end }}">
    {{ partial "nav.html" . }}
    {{ block "main" . }}{{ end }}
    {{ if and (not .IsHome) (not (in (slice "bio" "media" "events" "contact") .Type)) }}{{ partial "footer" . }}{{ end }}
</body>

</html>
