{{ define "main" }}
<main class="min-h-[calc(100svh-102px)] bg-black text-white">
  <article class="mx-auto max-w-3xl px-6 py-20 sm:px-10 sm:py-28 lg:py-36">
    {{ with .Params.form_action }}
          <section class="border-y border-white/20 py-10 sm:py-12">
            <h2 class="font-serif text-3xl font-normal">Send a message</h2>
            <form action="{{ . | safeURL }}" method="POST" class="mt-10 space-y-8">
              <div>
                <label for="name" class="mb-3 block text-xs tracking-[0.16em] text-white/55 uppercase">Name</label>
                <input type="text" id="name" name="name" placeholder="Name" autocomplete="name" required class="w-full rounded-none border-0 border-b border-white/30 bg-transparent px-0 py-3 text-base text-white outline-none transition placeholder:text-white/25 focus:border-white focus:ring-0">
              </div>

              <div>
                <label for="email" class="mb-3 block text-xs tracking-[0.16em] text-white/55 uppercase">Email</label>
                <input type="email" id="email" name="email" placeholder="Email" autocomplete="email" required class="w-full rounded-none border-0 border-b border-white/30 bg-transparent px-0 py-3 text-base text-white outline-none transition placeholder:text-white/25 focus:border-white focus:ring-0">
              </div>

              <div>
                <label for="message" class="mb-3 block text-xs tracking-[0.16em] text-white/55 uppercase">Message</label>
                <textarea id="message" name="message" placeholder="Message" rows="6" required class="w-full resize-y rounded-none border border-white/30 bg-transparent p-4 text-base leading-7 text-white outline-none transition placeholder:text-white/25 focus:border-white focus:ring-0"></textarea>
              </div>

              <button type="submit" class="inline-flex min-w-32 items-center justify-center border border-white px-8 py-3 text-xs tracking-[0.16em] uppercase transition hover:bg-white hover:text-black focus:bg-white focus:text-black focus:outline-none">Send</button>
            </form>
          </section>
    {{ end }}
  </article>
</main>
{{ end }}
